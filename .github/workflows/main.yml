name: ROM APK Extractor (Telegram Individual Upload)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "ROM URL"
        required: true

      telegram_bot_token:
        description: "Telegram Bot Token (optional)"
        required: false

      telegram_chat_id:
        description: "Telegram Chat ID (optional)"
        required: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      # =========================
      # 1. INSTALL TOOLS
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y unzip zip p7zip-full wget simg2img erofs-utils

      # =========================
      # 2. GET LPUNPACK (MIRROR)
      # =========================
      - name: Setup lpunpack
        run: |
          git clone https://github.com/whyshhnuv/lpunpack-lpmake-mirror.git tools
          chmod +x tools/binary/lpunpack
          cp tools/binary/lpunpack $GITHUB_WORKSPACE/lpunpack

      # =========================
      # 3. DOWNLOAD ROM
      # =========================
      - name: Download ROM
        run: |
          wget -O rom.zip "${{ github.event.inputs.rom_url }}"

      # =========================
      # 4. EXTRACT ROM
      # =========================
      - name: Extract ROM
        run: |
          mkdir rom
          unzip -q rom.zip -d rom || 7z x rom.zip -orom -y

      # =========================
      # 5. FIND + MERGE SUPER
      # =========================
      - name: Prepare super.img
        run: |
          mkdir work
          find rom -iname "super.img*" -exec cp {} work/ \; || true

          cd work
          if ls super.img.* 1>/dev/null 2>&1; then
            cat super.img.* > super.img
          fi

      # =========================
      # 6. CONVERT SPARSE
      # =========================
      - name: Normalize image
        run: |
          cd work
          simg2img super.img super.raw.img || cp super.img super.raw.img

      # =========================
      # 7. UNPACK SUPER
      # =========================
      - name: Unpack partitions
        run: |
          mkdir out
          ./lpunpack work/super.raw.img out/

      # =========================
      # 8. EXTRACT APK ONLY (NO PROP IN TELEGRAM MODE)
      # =========================
      - name: Extract APKs only
        run: |
          mkdir apk_out

          process() {
            img="$1"
            name=$(basename "$img")

            mkdir tmp

            7z x "$img" -otmp >/dev/null 2>&1 || true

            find tmp -type f \( \
              -path "*/app/*" -o \
              -path "*/priv-app/*" -o \
              -path "*/data-app/*" \
            \) -name "*.apk" -exec cp -n {} apk_out/ \; || true

            rm -rf tmp
          }

          export -f process
          find out -name "*.img" | xargs -I {} bash -c 'process "$@"' _ {}

      # =========================
      # 9. SHOW ZIP SIZE
      # =========================
      - name: Create ZIP + show size
        run: |
          zip -r apks.zip apk_out

          echo "===================="
          echo "ZIP SIZE INFO"
          echo "===================="

          ls -lh apks.zip

          echo "Size (bytes):"
          stat -c%s apks.zip

      # =========================
      # 10. TELEGRAM: SEND APKS INDIVIDUALLY
      # =========================
      - name: Upload APKs to Telegram individually
        run: |
          if [ -z "${{ github.event.inputs.telegram_bot_token }}" ] || [ -z "${{ github.event.inputs.telegram_chat_id }}" ]; then
            echo "Telegram not configured, skipping."
            exit 0
          fi

          TOKEN="${{ github.event.inputs.telegram_bot_token }}"
          CHAT="${{ github.event.inputs.telegram_chat_id }}"

          mkdir split_apk

          # Copy APKs safely
          cp apk_out/*.apk split_apk/ 2>/dev/null || true

          count=0

          for apk in split_apk/*.apk; do
            [ -e "$apk" ] || continue

            count=$((count+1))
            echo "Uploading APK $count: $apk"

            curl -s -F document=@"$apk" \
              "https://api.telegram.org/bot$TOKEN/sendDocument" \
              -F chat_id="$CHAT" || true

            sleep 1
          done

          echo "Total APKs sent: $count"

      # =========================
      # 11. GITHUB ARTIFACT (OPTIONAL BACKUP)
      # =========================
      - name: Upload ZIP backup
        uses: actions/upload-artifact@v4
        with:
          name: APK-ONLY-ZIP
          path: apks.zip
