name: ROM APK Extractor (Lite + Telegram)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "ROM URL"
        required: true

      telegram_bot_token:
        description: "Telegram Bot Token (optional)"
        required: false

      telegram_chat_id:
        description: "Telegram Chat ID (optional)"
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:

      # =========================
      # 1. INSTALL TOOLS
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y unzip zip p7zip-full wget zstd erofs-utils android-sdk-libsparse-utils

      # =========================
      # 2. LPUNPACK BINARY
      # =========================
      - name: Setup lpunpack
        run: |
          git clone https://github.com/whyshhnuv/lpunpack-lpmake-mirror.git tools
          chmod +x tools/binary/lpunpack
          cp tools/binary/lpunpack $GITHUB_WORKSPACE/lpunpack

      # =========================
      # 3. DOWNLOAD ROM
      # =========================
      - name: Download ROM
        run: |
          wget -O rom.zip "${{ github.event.inputs.rom_url }}"

      # =========================
      # 4. EXTRACT ROM
      # =========================
      - name: Extract ROM
        run: |
          mkdir rom
          unzip -q rom.zip -d rom || 7z x rom.zip -orom -y

      # =========================
      # 5. PREPARE SUPER
      # =========================
      - name: Prepare super.img
        run: |
          mkdir work

          find rom -iname "super.img*" -exec cp {} work/ \; || true
          cd work

          # Decompress .zst if present
          if [ -f super.img.zst ]; then
            echo "Decompressing super.img.zst..."
            zstd -d super.img.zst -o super.img && rm -f super.img.zst
          fi

          # Handle splitted sparse images (super.img.1, super.img.2, ...)
          shopt -s nullglob
          parts=( super.img.[0-9]* )
          if [ ${#parts[@]} -gt 0 ]; then
            echo "Merging ${#parts[@]} splitted super.img parts..."
            cat "${parts[@]}" > super.img.merged && mv super.img.merged super.img
            rm -f super.img.[0-9]*
          fi
          shopt -u nullglob

          if [ ! -f super.img ]; then
            echo "❌ super.img not found after preparation" && exit 1
          fi
          echo "✅ super.img ready ($(ls -lh super.img | awk '{print $5}'))"

      # =========================
      # 6. SAFE SPARSE HANDLING
      # =========================
      - name: Normalize image
        run: |
          cd work

          if command -v simg2img >/dev/null 2>&1; then
            simg2img super.img super.raw.img || cp super.img super.raw.img
          else
            cp super.img super.raw.img
          fi

      # =========================
      # 7. UNPACK SUPER
      # =========================
      - name: Unpack partitions
        run: |
          mkdir super_out
          ./lpunpack work/super.raw.img super_out

      # =========================
      # 8. EXTRACT APK ONLY
      # =========================
      - name: Extract APKs only
        run: |
          mkdir apk_out

          process() {
            img="$1"

            mkdir tmp
            7z x "$img" -otmp >/dev/null 2>&1 || true

            find tmp -type f \( \
              -path "*/app/*" -o \
              -path "*/priv-app/*" -o \
              -path "*/data-app/*" \
            \) -name "*.apk" -exec cp -n {} apk_out/ \; || true

            rm -rf tmp
          }

          export -f process
          find super_out -name "*.img" | xargs -I {} bash -c 'process "$@"' _ {}

      # =========================
      # 9. TELEGRAM UPLOAD (INDIVIDUAL APKS)
      # =========================
      - name: Upload APKs to Telegram individually
        run: |
          if [ -z "${{ github.event.inputs.telegram_bot_token }}" ] || [ -z "${{ github.event.inputs.telegram_chat_id }}" ]; then
            echo "Telegram not configured. Skipping upload."
            exit 0
          fi

          TOKEN="${{ github.event.inputs.telegram_bot_token }}"
          CHAT="${{ github.event.inputs.telegram_chat_id }}"

          count=0

          for apk in apk_out/*.apk; do
            [ -e "$apk" ] || continue

            count=$((count+1))
            echo "Uploading [$count]: $apk"

            curl -s -F document=@"$apk" \
              "https://api.telegram.org/bot$TOKEN/sendDocument" \
              -F chat_id="$CHAT" || true

            sleep 1
          done

          echo "Total APKs uploaded: $count"

      # =========================
      # 10. OPTIONAL ARTIFACT (SMALL BACKUP ONLY)
      # =========================
      - name: Upload APK ZIP backup
        run: |
          zip -r apk_only.zip apk_out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK-ONLY
          path: apk_only.zip

      # =========================
      # 11. CLEANUP (CRITICAL FOR SIZE CONTROL)
      # =========================
      - name: Cleanup heavy files
        run: |
          rm -rf rom
          rm -rf work
          rm -rf super_out
