name: ROM APK Extractor PRO (Pixeldrain Primary)

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "ROM URL"
        required: true

      pixeldrain_token:
        description: "Pixeldrain API Token (REQUIRED)"
        required: true

      upload_apk_pixeldrain:
        description: "Upload APK individually to Pixeldrain (true/false)"
        required: false
        default: "false"

      upload_apk_telegram:
        description: "Upload APK individually to Telegram (true/false)"
        required: false
        default: "false"

      telegram_bot_token:
        description: "Telegram Bot Token (optional)"
        required: false

      telegram_chat_id:
        description: "Telegram Chat ID (optional)"
        required: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:

      # =========================
      # 1. INSTALL TOOLS
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            unzip zip p7zip-full \
            wget curl \
            zstd xz-utils lz4 brotli \
            erofs-utils f2fs-tools \
            android-sdk-libsparse-utils \
            xxd file

      # =========================
      # 2. LPUNPACK
      # =========================
      - name: Setup lpunpack
        run: |
          git clone https://github.com/whyshhnuv/lpunpack-lpmake-mirror.git tools
          chmod +x tools/binary/lpunpack
          cp tools/binary/lpunpack $GITHUB_WORKSPACE/lpunpack

      # =========================
      # 3. DOWNLOAD ROM
      # =========================
      - name: Download ROM
        run: |
          wget -O rom.zip "${{ github.event.inputs.rom_url }}"

      # =========================
      # 4. EXTRACT ROM + VERIFY
      # =========================
      - name: Extract ROM
        run: |
          mkdir rom
          unzip -q rom.zip -d rom || 7z x rom.zip -orom -y

          echo "========== ROM STRUCTURE (top 3 levels) =========="
          find rom -maxdepth 3 -type f -o -type d | head -100
          echo "=================================================="
          echo "Total files extracted: $(find rom -type f | wc -l)"

      # =========================
      # 5. DISCOVER + PREPARE SUPER IMAGE
      # =========================
      - name: Prepare super image
        run: |
          set -x  # echo all commands for debugging

          mkdir work

          # === STEP 1: Find all super-related files ===
          echo ">>> Searching for super image files..."
          find rom -type f \( \
            -iname "super*" \
          \) 2>/dev/null | sort > /tmp/super_files.txt
          cat /tmp/super_files.txt
          echo "---"

          # === STEP 2: Also look for payload.bin ===
          if grep -qi "payload.bin" /tmp/super_files.txt || find rom -iname "payload.bin" -type f | head -1 | grep -q .; then
            echo "⚠️  Found payload.bin — this ROM uses incremental OTA, not super.img!"
            echo "    payload.bin requires a different extraction method."
          fi

          # === STEP 3: Copy everything matching super.img* or super*image* to work/ ===
          find rom -type f \( \
            -iname "super.img*" -o \
            -iname "super*image*" -o \
            -iname "super.raw*" \
          \) -exec cp -v {} work/ \; 2>/dev/null || true

          # Also check for bare "super" (no extension)
          find rom -type f -name "super" -exec cp -v {} work/super.noext \; 2>/dev/null || true

          cd work
          echo ""
          echo ">>> Files in work/ after copy:"
          ls -lh 2>/dev/null || echo "(empty)"

          # === STEP 4: Decompress common formats ===
          # Decompress super.img.* (any compression format)
          for ext in zst lz4 xz br gz bz2; do
            if [ -f "super.img.$ext" ]; then
              echo ">>> Decompressing super.img.$ext..."
              case "$ext" in
                zst) zstd -d "super.img.$ext" -o super.img 2>&1 && rm -f "super.img.$ext" ;;
                lz4) lz4 -d "super.img.$ext" super.img 2>&1 && rm -f "super.img.$ext" ;;
                xz)  unxz -f "super.img.$ext" 2>&1 ;;  # creates super.img in-place
                br)  brotli -d "super.img.$ext" -o super.img 2>&1 && rm -f "super.img.$ext" ;;
                gz)  gunzip -f "super.img.$ext" 2>&1 ;;  # creates super.img in-place
                bz2) bunzip2 -f "super.img.$ext" 2>&1 ;;  # creates super.img in-place
              esac
              echo "  -> Result: $(ls -lh super.img 2>/dev/null | awk '{print $5}')"
            fi
          done

          # Also handle bare "super" (no .img) with compression
          for ext in zst lz4 xz br gz bz2; do
            if [ -f "super.$ext" ]; then
              echo ">>> Decompressing super.$ext -> super.img..."
              case "$ext" in
                zst) zstd -d "super.$ext" -o super.img 2>&1 && rm -f "super.$ext" ;;
                lz4) lz4 -d "super.$ext" super.img 2>&1 && rm -f "super.$ext" ;;
                xz)  unxz -c "super.$ext" > super.img 2>&1 && rm -f "super.$ext" ;;
                br)  brotli -d "super.$ext" -o super.img 2>&1 && rm -f "super.$ext" ;;
                gz)  gunzip -c "super.$ext" > super.img 2>&1 && rm -f "super.$ext" ;;
                bz2) bunzip2 -c "super.$ext" > super.img 2>&1 && rm -f "super.$ext" ;;
              esac
              echo "  -> Result: $(ls -lh super.img 2>/dev/null | awk '{print $5}')"
            fi
          done

          # Handle super.noext (bare "super" without extension)
          if [ -f super.noext ] && [ ! -f super.img ]; then
            echo ">>> Renaming super (no extension) -> super.img"
            mv super.noext super.img
          fi

          # === STEP 5: Merge splitted parts ===
          shopt -s nullglob
          parts=( super.img.[0-9]* )
          if [ ${#parts[@]} -gt 0 ]; then
            echo ""
            echo ">>> Merging ${#parts[@]} splitted parts..."
            cat "${parts[@]}" > super.img.merged && mv super.img.merged super.img
            rm -f super.img.[0-9]*
          fi
          shopt -u nullglob

          echo ""
          echo ">>> Final state in work/:"
          ls -lh

          # === STEP 6: Verify & report ===
          if [ ! -f super.img ]; then
            echo ""
            echo "===================================================="
            echo "❌  FAILED: No super image found!"
            echo "    Searched patterns: super.img*, super*image*, super.raw*, super (no ext)"
            echo "    All extracted files listed above in ROM STRUCTURE."
            echo "    This ROM may use a different partition scheme."
            echo "===================================================="
            exit 1
          fi

          SIZE=$(ls -lh super.img | awk '{print $5}')
          echo ""
          echo ">>> File type identification:"
          file super.img

          echo ""
          echo "============================================"
          echo "✅  super.img ready — size: $SIZE"
          echo "============================================"

      # =========================
      # 6. SPARSE CHECK → USE RAW DIRECTLY
      # =========================
      - name: Normalize image (sparse→raw)
        run: |
          cd work

          echo ">>> Checking super.img format:"
          file super.img

          # Test if it's sparse: simg2img to /dev/null — succeeds only for sparse
          if simg2img super.img /dev/null 2>/dev/null; then
            echo ">>> ✅ Sparse image detected. Converting to raw..."
            simg2img super.img super.raw.img
            echo "    Converted: $(ls -lh super.raw.img | awk '{print $5}')"
          else
            echo ">>> ✅ Image is already raw. No conversion needed."
            echo "    Using super.img directly (skipping 9GB copy)."
            # Create a marker so unpack step knows it's already raw
            touch .raw_already
          fi

      # =========================
      # 7. UNPACK SUPER IMAGE
      # =========================
      - name: Unpack partitions
        run: |
          mkdir super_out

          # Use super.raw.img if sparse conversion happened, otherwise super.img (already raw)
          if [ -f work/super.raw.img ]; then
            IMG="work/super.raw.img"
          else
            IMG="work/super.img"
          fi

          echo ">>> Input image: $IMG ($(ls -lh "$IMG" | awk '{print $5}'))"
          echo ">>> Running lpunpack..."
          echo ""

          ./lpunpack "$IMG" super_out 2>&1

          RC=$?
          echo ""
          echo ">>> lpunpack exit code: $RC"

          if [ $RC -ne 0 ]; then
            echo ""
            echo "===================================================="
            echo "❌  lpunpack FAILED (exit code $RC)"
            echo "    Possible causes:"
            echo "      - Image is not a valid logical partition (super) format"
            echo "      - Image is corrupted or truncated during download"
            echo "      - Different image format (e.g. EROFS, EXT4 directly)"
            echo "    Checking image header:"
            xxd "$IMG" | head -4 2>/dev/null || true
            echo "===================================================="
            exit $RC
          fi

          echo ""
          echo ">>> Partitions extracted:"
          ls -lh super_out/
          echo "Total: $(ls super_out/ | wc -l)"

      # =========================
      # 8. DISCOVER STANDALONE PARTITIONS
      # =========================
      - name: Discover standalone partition images
        run: |
          mkdir -p parts

          echo ">>> Searching for standalone partition images in rom/..."
          # Common partition image names (excluding super* and boot/recovery)
          while IFS= read -r img; do
            name=$(basename "$img")
            # Skip if already extracted by lpunpack
            if [ -f "super_out/$name" ]; then
              echo "  ⏭️  $name already in super_out — skipping"
            else
              cp -v "$img" "parts/$name"
            fi
          done < <(find rom -type f \( \
            -iname "system.img" -o \
            -iname "system_ext.img" -o \
            -iname "product.img" -o \
            -iname "vendor.img" -o \
            -iname "vendor_dlkm.img" -o \
            -iname "odm.img" -o \
            -iname "odm_dlkm.img" -o \
            -iname "system_dlkm.img" \
          \) 2>/dev/null)

          found=$(ls parts/ 2>/dev/null | wc -l)
          echo ""
          echo ">>> Standalone partitions found: $found"
          ls -lh parts/ 2>/dev/null || echo "(none)"

      # =========================
      # 9. EXTRACT APK FROM PARTITIONS
      # =========================
      - name: Extract APKs
        run: |
          mkdir apk_out

          process() {
            img="$1"
            name=$(basename "$img")

            echo ""
            echo ">>> Processing: $name"

            mkdir tmp

            # ---- Try extraction methods in order ----
            extracted=false

            # Method 1: EROFS (modern ROMs)
            if command -v extract.erofs &>/dev/null; then
              if extract.erofs -i "$img" -o tmp &>/dev/null; then
                echo "  ✅ $name: EROFS format — extracted"
                extracted=true
              fi
            fi

            # Method 2: Loop mount (ext4, f2fs, etc.)
            if ! $extracted; then
              if sudo mount -o loop,ro "$img" tmp 2>/dev/null; then
                echo "  ✅ $name: mounted via loop"
                extracted=true
              fi
            fi

            # Method 3: 7z fallback (sparse images, compressed formats)
            if ! $extracted; then
              7z x "$img" -otmp >/dev/null 2>&1 || true
              if [ "$(find tmp -type f 2>/dev/null | wc -l)" -gt 0 ]; then
                echo "  ✅ $name: 7z extraction succeeded"
              else
                echo "  ⚠️  $name: unknown format"
                file "$img" | head -1
              fi
            fi

            # ---- Collect APKs ----
            apk_count=0
            if [ -d tmp ]; then
              while IFS= read -r apk; do
                cp -n "$apk" apk_out/ 2>/dev/null && apk_count=$((apk_count + 1))
              done < <(find tmp -type f \( \
                -path "*/app/*" -o \
                -path "*/priv-app/*" -o \
                -path "*/data-app/*" \
              \) -name "*.apk" 2>/dev/null)
            fi

            echo "  📱 APKs found: $apk_count"

            # ---- Cleanup ----
            if mountpoint -q tmp 2>/dev/null; then
              sudo umount tmp 2>/dev/null || true
            fi
            rm -rf tmp
          }

          export -f process

          # Process images from lpunpack (super_out) AND standalone partitions (parts)
          echo ">>> Processing super_out/ (lpunpack output)..."
          find super_out -name "*.img" -type f -size +1M | sort | \
            xargs -I {} bash -c 'process "$@"' _ {}

          echo ""
          echo ">>> Processing parts/ (standalone images)..."
          if [ -d parts ]; then
            find parts -name "*.img" -type f -size +1M | sort | \
              xargs -I {} bash -c 'process "$@"' _ {}
          fi

          echo ""
          echo "============================================"
          echo "Total APKs collected: $(ls apk_out/ 2>/dev/null | wc -l)"
          ls -lh apk_out/ 2>/dev/null || echo "(empty)"
          echo "============================================"

      # =========================
      # 9. CREATE ZIP (ALWAYS REQUIRED)
      # =========================
      - name: Create ZIP
        run: |
          zip -r apk_pack.zip apk_out

          echo "===================="
          echo "ZIP SIZE"
          echo "===================="

          ls -lh apk_pack.zip

      # =========================
      # 10. PIXELDRAIN ZIP UPLOAD (MANDATORY)
      # =========================
      - name: Upload ZIP to Pixeldrain
        run: |
          TOKEN="${{ github.event.inputs.pixeldrain_token }}"
          AUTH=$(echo -n ":$TOKEN" | base64)

          response=$(curl -s -X POST \
            -H "Authorization: Basic $AUTH" \
            -F "file=@apk_pack.zip" \
            "https://pixeldrain.com/api/file")

          echo "Pixeldrain ZIP response:"
          echo "$response"

      # =========================
      # 11. OPTIONAL: APK → PIXELDRAIN
      # =========================
      - name: Upload APKs to Pixeldrain (optional)
        run: |
          if [ "${{ github.event.inputs.upload_apk_pixeldrain }}" != "true" ]; then
            echo "Skipped Pixeldrain APK upload"
            exit 0
          fi

          TOKEN="${{ github.event.inputs.pixeldrain_token }}"
          AUTH=$(echo -n ":$TOKEN" | base64)

          for file in apk_out/*.apk; do
            [ -e "$file" ] || continue

            curl -s -X POST \
              -H "Authorization: Basic $AUTH" \
              -F "file=@$file" \
              "https://pixeldrain.com/api/file" || true

            sleep 1
          done

      # =========================
      # 12. OPTIONAL: APK → TELEGRAM
      # =========================
      - name: Upload APKs to Telegram (optional)
        run: |
          if [ "${{ github.event.inputs.upload_apk_telegram }}" != "true" ]; then
            echo "Skipped Telegram APK upload"
            exit 0
          fi

          if [ -z "${{ github.event.inputs.telegram_bot_token }}" ] || [ -z "${{ github.event.inputs.telegram_chat_id }}" ]; then
            echo "Telegram not configured properly"
            exit 0
          fi

          TOKEN="${{ github.event.inputs.telegram_bot_token }}"
          CHAT="${{ github.event.inputs.telegram_chat_id }}"

          for file in apk_out/*.apk; do
            [ -e "$file" ] || continue

            curl -s -F document=@"$file" \
              "https://api.telegram.org/bot$TOKEN/sendDocument" \
              -F chat_id="$CHAT" || true

            sleep 1
          done

      # =========================
      # 13. CLEANUP
      # =========================
      - name: Cleanup
        run: |
          rm -rf rom work super_out apk_out
